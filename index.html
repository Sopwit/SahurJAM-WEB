<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iftar Vakti</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="gameContainer">
      <div id="startScreen" class="start-screen">
        <div class="start-bg"></div>
        <div class="start-overlay"></div>
        <div class="start-content">
          <div class="start-tag">Cooking Management • Ramazan Special</div>
          <h1 class="start-title">IFTAR<br />VAKTI</h1>
          <p class="start-subtitle">Ezan calmadan once herkesi doyur</p>
          <button id="startButton" class="start-button" type="button">OYUNA BASLA</button>
        </div>
      </div>
      <canvas id="gameCanvas" width="900" height="600"></canvas>
      <div id="hud">
        <div id="score">Skor: 0</div>
        <div id="combo"></div>
        <div id="timer">03:00</div>
        <div id="cycle">DONGU: IFTAR</div>
        <div id="orders"></div>
        <div id="notifications"></div>
      </div>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
